<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryuu 龍 — Personalised Learning</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#09090f;font-family:'DM Sans',sans-serif;color:#f1f0ed;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#13131a}
  ::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes dragonGlow{0%,100%{box-shadow:0 0 20px rgba(220,38,38,0.15)}50%{box-shadow:0 0 35px rgba(220,38,38,0.3)}}
  .fade-in{animation:fadeIn 0.4s ease forwards}
  .screen{min-height:100vh;display:flex;flex-direction:column}
  .app-container{max-width:420px;margin:0 auto;min-height:100vh;position:relative;background:#09090f}
  input:focus{outline:2px solid #e11d4866;outline-offset:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const C={
  bg:'#09090f',bg2:'#111118',bg3:'#18181f',
  card:'#1c1c26',card2:'#222230',
  red:'#e11d48',redL:'#fb7185',redD:'#9f1239',
  gold:'#f59e0b',goldL:'#fcd34d',
  blue:'#3b82f6',
  green:'#22c55e',greenL:'#86efac',
  text:'#f1f0ed',muted:'#7c7c8a',faint:'#3a3a4a',
  border:'rgba(255,255,255,0.07)'
};

const Logo=({size=28})=>(
  <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
    <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2z" fill="#9f1239" opacity=".3"/>
    <path d="M22 10c-1.5-1-3.5-1.5-6-1.5S11.5 9 10 10l-2 6 2 1.5L8 22l8-3 8 3-2-4.5 2-1.5-2-6z" fill="#e11d48"/>
    <path d="M16 8l2 4-2 2-2-2 2-4z" fill="#fcd34d"/>
    <circle cx="12.5" cy="14" r="1.2" fill="#fff"/>
    <circle cx="19.5" cy="14" r="1.2" fill="#fff"/>
  </svg>
);

const XPBar=({val,max=100,color=C.red})=>{
  const pct=Math.min(100,Math.round((val/max)*100));
  return(
    <div style={{background:C.faint,borderRadius:99,height:6,overflow:'hidden'}}>
      <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:99,transition:'width 0.8s ease'}}/>
    </div>
  );
};

const Badge=({label,color=C.red,small})=>(
  <span style={{background:color+'22',color,border:`1px solid ${color}44`,borderRadius:99,padding:small?'2px 8px':'4px 12px',fontSize:small?11:12,fontWeight:500,whiteSpace:'nowrap'}}>{label}</span>
);

const Card=({children,style,onClick,glow})=>(
  <div onClick={onClick}
    style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:'16px',
      cursor:onClick?'pointer':'default',transition:'transform 0.2s,box-shadow 0.2s',
      animation:glow?'dragonGlow 3s ease infinite':undefined,...style}}
    onMouseEnter={e=>{if(onClick){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.4)'}}}
    onMouseLeave={e=>{if(onClick){e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=''}}}>
    {children}
  </div>
);

const BottomNav=({screen,setScreen})=>{
  const tabs=[
    {id:'dashboard',icon:'⊞',label:'Home'},
    {id:'path',icon:'◈',label:'Path'},
    {id:'progress',icon:'◎',label:'Progress'},
    {id:'achievements',icon:'✦',label:'Awards'},
  ];
  return(
    <div style={{position:'sticky',bottom:0,background:C.bg2,borderTop:`1px solid ${C.border}`,display:'flex',padding:'8px 0 12px',zIndex:99}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setScreen(t.id)}
          style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'4px 0'}}>
          <span style={{fontSize:20,filter:screen===t.id?'none':'grayscale(1) opacity(0.4)',transition:'filter 0.2s',color:screen===t.id?C.red:'inherit'}}>{t.icon}</span>
          <span style={{fontSize:10,color:screen===t.id?C.red:C.muted,fontWeight:screen===t.id?600:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

/* ── LOGIN ── */
const LoginScreen=({onLogin})=>{
  const [role,setRole]=useState('student');
  const [name,setName]=useState('');
  return(
    <div className="screen fade-in" style={{background:C.bg,justifyContent:'center',alignItems:'center',padding:'32px 24px',minHeight:'100vh'}}>
      <div style={{textAlign:'center',marginBottom:40}}>
        <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
          <div style={{background:'#9f123922',border:'1px solid #e11d4844',borderRadius:20,padding:20,animation:'dragonGlow 3s ease infinite'}}>
            <Logo size={48}/>
          </div>
        </div>
        <h1 style={{fontFamily:"'Noto Serif JP',serif",fontSize:36,fontWeight:700,letterSpacing:2,color:C.text}}>龍</h1>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:400,color:C.redL,letterSpacing:4,marginBottom:4}}>RYUU</h2>
        <p style={{color:C.muted,fontSize:13,letterSpacing:1}}>Learn at your own pace. Rise like a dragon.</p>
      </div>
      <div style={{width:'100%',maxWidth:320}}>
        <div style={{display:'flex',background:C.card,borderRadius:12,padding:4,marginBottom:24,border:`1px solid ${C.border}`}}>
          {['student','teacher'].map(r=>(
            <button key={r} onClick={()=>setRole(r)}
              style={{flex:1,padding:'8px',background:role===r?C.red:'none',border:'none',borderRadius:9,
                color:role===r?'#fff':C.muted,fontSize:13,fontWeight:500,cursor:'pointer',transition:'all 0.2s',textTransform:'capitalize',fontFamily:'DM Sans,sans-serif'}}>
              {r}
            </button>
          ))}
        </div>
        <div style={{marginBottom:16}}>
          <input value={name} onChange={e=>setName(e.target.value)}
            placeholder={role==='student'?'Your name...':'Teacher name...'}
            style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 16px',
              color:C.text,fontSize:14,fontFamily:'DM Sans,sans-serif'}}/>
        </div>
        <button onClick={()=>onLogin(role,name||(role==='student'?'Suraj':'Mrs. Annu'))}
          style={{width:'100%',background:`linear-gradient(135deg,${C.red},${C.redD})`,border:'none',borderRadius:12,
            padding:'15px',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',letterSpacing:0.5,
            boxShadow:'0 4px 20px rgba(225,29,72,0.35)',fontFamily:'DM Sans,sans-serif'}}
          onMouseEnter={e=>e.target.style.opacity='0.9'}
          onMouseLeave={e=>e.target.style.opacity='1'}>
          Enter Ryuu →
        </button>
        <p style={{textAlign:'center',color:C.muted,fontSize:12,marginTop:20}}>Personalised learning for every pace 🐉</p>
      </div>
    </div>
  );
};

/* ── DASHBOARD ── */
const DashboardScreen=({user,setScreen,setLesson})=>{
  const subjects=[
    {name:'Mathematics',topic:'Fractions & Decimals',progress:68,color:C.red,icon:'∑'},
    {name:'Science',topic:'Plants & Photosynthesis',progress:45,color:C.blue,icon:'⚗'},
    {name:'English',topic:'Reading Comprehension',progress:82,color:C.gold,icon:'Aa'},
    {name:'History',topic:'Ancient Civilisations',progress:30,color:'#a855f7',icon:'⏳'},
  ];
  const today=[
    {time:'10:00',task:'Maths - 3 questions',done:true},
    {time:'11:30',task:'English Reading Quiz',done:true},
    {time:'14:00',task:'Science Practice',done:false},
    {time:'16:00',task:'History Flashcards',done:false},
  ];
  return(
    <div className="fade-in" style={{flex:1,overflow:'auto',paddingBottom:80}}>
      <div style={{padding:'24px 20px 16px',background:`linear-gradient(180deg,#1a0810 0%,${C.bg} 100%)`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div>
            <p style={{color:C.muted,fontSize:12,letterSpacing:1,marginBottom:4}}>WELCOME BACK</p>
            <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700}}>{user.name} 👋</h2>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'8px 14px',textAlign:'center'}}>
            <div style={{color:C.gold,fontSize:18,fontWeight:700}}>🔥 7</div>
            <div style={{color:C.muted,fontSize:10}}>day streak</div>
          </div>
        </div>
        <Card style={{background:'linear-gradient(135deg,#1a0810,#2a0818)',border:`1px solid ${C.red}33`}} glow>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <p style={{color:C.redL,fontSize:11,letterSpacing:1,fontWeight:500}}>TODAY'S GOAL</p>
              <p style={{fontSize:15,fontWeight:600,marginTop:2}}>Complete 3 lessons</p>
            </div>
            <div style={{background:C.red+'22',border:`1px solid ${C.red}44`,borderRadius:10,padding:'8px 14px',textAlign:'center'}}>
              <span style={{fontSize:20,fontWeight:700,color:C.red}}>2/3</span>
              <p style={{color:C.muted,fontSize:10}}>done</p>
            </div>
          </div>
          <XPBar val={66} color={C.red}/>
          <p style={{color:C.muted,fontSize:11,marginTop:6}}>1 more lesson to unlock today's badge!</p>
        </Card>
      </div>

      <div style={{padding:'0 20px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
          {[
            {label:'XP Points',val:'2,840',icon:'⚡',color:C.gold},
            {label:'Rank',val:'#12',icon:'🏆',color:'#a855f7'},
            {label:'Lessons Done',val:'47',icon:'📖',color:C.blue},
            {label:'Accuracy',val:'78%',icon:'🎯',color:C.green}
          ].map(s=>(
            <Card key={s.label} style={{padding:'14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <p style={{color:C.muted,fontSize:11,marginBottom:4}}>{s.label}</p>
                  <p style={{fontSize:20,fontWeight:700,color:s.color}}>{s.val}</p>
                </div>
                <span style={{fontSize:18}}>{s.icon}</span>
              </div>
            </Card>
          ))}
        </div>

        <div style={{marginBottom:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <h3 style={{fontSize:15,fontWeight:600}}>Continue Learning</h3>
            <button onClick={()=>setScreen('path')} style={{background:'none',border:'none',color:C.red,fontSize:12,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>See all →</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {subjects.map(s=>(
              <Card key={s.name} onClick={()=>{setLesson(s);setScreen('lesson')}} style={{padding:'14px'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:42,height:42,borderRadius:12,background:s.color+'22',border:`1px solid ${s.color}44`,
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700,color:s.color,flexShrink:0}}>
                    {s.icon}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                      <p style={{fontSize:13,fontWeight:600}}>{s.name}</p>
                      <span style={{fontSize:12,color:s.color,fontWeight:600}}>{s.progress}%</span>
                    </div>
                    <p style={{fontSize:11,color:C.muted,marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.topic}</p>
                    <XPBar val={s.progress} color={s.color}/>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>

        <div>
          <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Today's Schedule</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {today.map((t,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                background:t.done?C.card:C.card2,borderRadius:12,
                border:`1px solid ${t.done?C.border:C.green+'33'}`,opacity:t.done?0.6:1}}>
                <span style={{fontSize:14,width:24,textAlign:'center',color:t.done?C.green:C.muted}}>{t.done?'✓':'○'}</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:13,fontWeight:500,textDecoration:t.done?'line-through':'none',color:t.done?C.muted:C.text}}>{t.task}</p>
                  <p style={{fontSize:11,color:C.muted}}>{t.time}</p>
                </div>
                {!t.done&&<Badge label="Due" color={C.green} small/>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── PATH ── */
const PathScreen=({setScreen,setLesson})=>{
  const modules=[
    {id:1,name:'Foundation',status:'done',lessons:8,done:8,color:C.green},
    {id:2,name:'Building Blocks',status:'done',lessons:6,done:6,color:C.green},
    {id:3,name:'Core Concepts',status:'active',lessons:10,done:4,color:C.red},
    {id:4,name:'Application',status:'locked',lessons:8,done:0,color:C.muted},
    {id:5,name:'Advanced',status:'locked',lessons:12,done:0,color:C.muted},
  ];
  const currentLessons=[
    {name:'Fractions — Basics',time:'8 min',type:'Video',done:true,xp:50},
    {name:'Adding Fractions',time:'12 min',type:'Practice',done:true,xp:75},
    {name:'Subtracting Fractions',time:'10 min',type:'Quiz',done:true,xp:60},
    {name:'Mixed Numbers',time:'15 min',type:'Practice',done:true,xp:80},
    {name:'Decimals Intro',time:'10 min',type:'Video',done:false,xp:55},
    {name:'Comparing Decimals',time:'12 min',type:'Quiz',done:false,xp:65},
    {name:'Fractions to Decimals',time:'14 min',type:'Practice',done:false,xp:90},
    {name:'Word Problems',time:'20 min',type:'Challenge',done:false,xp:120},
    {name:'Speed Test',time:'8 min',type:'Test',done:false,xp:100},
    {name:'Module Review',time:'25 min',type:'Final',done:false,xp:150},
  ];
  const typeColor={Video:C.blue,Practice:C.green,Quiz:C.gold,Challenge:C.red,Test:'#a855f7',Final:C.red};
  return(
    <div className="fade-in" style={{flex:1,overflow:'auto',paddingBottom:80}}>
      <div style={{padding:'24px 20px 0'}}>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:20,fontWeight:700,marginBottom:4}}>Your Learning Path</h2>
        <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Personalised for your pace by Ryuu AI</p>

        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:8,marginBottom:24}}>
          {modules.map((m,i)=>(
            <div key={m.id} style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0,gap:6}}>
              {i>0&&<div style={{width:2,height:12,background:m.status==='done'?C.green:C.faint}}/>}
              <div style={{width:56,height:56,borderRadius:16,background:m.status==='locked'?C.card:m.color+'22',
                border:`2px solid ${m.status==='locked'?C.faint:m.color}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>
                {m.status==='done'?'✓':m.status==='active'?'▶':'🔒'}
              </div>
              <span style={{fontSize:10,color:m.status==='locked'?C.muted:C.text,textAlign:'center',maxWidth:56}}>{m.name}</span>
            </div>
          ))}
        </div>

        <Card style={{background:'linear-gradient(135deg,#0d1a2e,#111827)',border:`1px solid ${C.blue}33`,marginBottom:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div>
              <p style={{color:'#60a5fa',fontSize:11,letterSpacing:1}}>CURRENT MODULE</p>
              <p style={{fontSize:16,fontWeight:700,marginTop:2}}>Core Concepts</p>
            </div>
            <Badge label="4/10 done" color={C.blue}/>
          </div>
          <XPBar val={40} color={C.blue}/>
          <p style={{color:C.muted,fontSize:11,marginTop:6}}>AI suggests: complete 2 lessons today to stay on track</p>
        </Card>

        <h3 style={{fontSize:15,fontWeight:600,marginBottom:14}}>Module Lessons</h3>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {currentLessons.map((l,i)=>(
            <Card key={i}
              onClick={!l.done?()=>{setLesson({name:'Mathematics',topic:l.name,progress:45,color:C.blue,icon:'∑'});setScreen('lesson')}:undefined}
              style={{padding:'12px 14px',cursor:l.done?'default':'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:32,height:32,borderRadius:10,
                  background:l.done?C.green+'22':typeColor[l.type]+'22',
                  border:`1px solid ${l.done?C.green:typeColor[l.type]}44`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:13,color:l.done?C.green:typeColor[l.type],flexShrink:0,fontWeight:700}}>
                  {l.done?'✓':`${i+1}`}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <p style={{fontSize:13,fontWeight:500,color:l.done?C.muted:C.text}}>{l.name}</p>
                    <span style={{fontSize:12,color:C.gold,fontWeight:600}}>+{l.xp}xp</span>
                  </div>
                  <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center'}}>
                    <Badge label={l.type} color={typeColor[l.type]} small/>
                    <span style={{fontSize:11,color:C.muted}}>⏱ {l.time}</span>
                  </div>
                </div>
              </div>
            </Card>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── LESSON ── */
const LessonScreen=({lesson,onBack})=>{
  const [phase,setPhase]=useState('intro');
  const [qIndex,setQIndex]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [score,setScore]=useState(0);

  const questions=[
    {q:'What is 1/2 + 1/4 equal to?',opts:['1/6','2/6','3/4','1/3'],ans:2,hint:'Find a common denominator first!'},
    {q:'Which decimal is equal to 3/4?',opts:['0.34','0.75','0.43','0.7'],ans:1,hint:'Divide 3 by 4 on paper or mentally.'},
    {q:'What is 0.5 as a fraction?',opts:['5/10','1/2','5/100','2/5'],ans:1,hint:'0.5 means 5 tenths — simplify it!'},
  ];
  const q=questions[qIndex];

  const handleAnswer=(i)=>{
    if(answered)return;
    setSelected(i);setAnswered(true);
    if(i===q.ans)setScore(s=>s+1);
  };
  const next=()=>{
    if(qIndex<questions.length-1){setQIndex(i=>i+1);setSelected(null);setAnswered(false);}
    else setPhase('result');
  };

  if(phase==='intro')return(
    <div className="fade-in screen" style={{padding:'24px 20px',background:C.bg,justifyContent:'space-between'}}>
      <div>
        <button onClick={onBack} style={{background:'none',border:'none',color:C.muted,fontSize:14,cursor:'pointer',marginBottom:20,fontFamily:'DM Sans,sans-serif'}}>← Back</button>
        <div style={{textAlign:'center',padding:'32px 0'}}>
          <div style={{width:72,height:72,borderRadius:20,background:lesson.color+'22',border:`1px solid ${lesson.color}44`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,fontWeight:700,color:lesson.color,margin:'0 auto 20px'}}>
            {lesson.icon}
          </div>
          <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700,marginBottom:8}}>{lesson.topic}</h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:24}}>{lesson.name} · Adaptive Lesson</p>
          <div style={{display:'flex',justifyContent:'center',gap:16,marginBottom:32}}>
            {[{label:'Questions',val:'3'},{label:'XP Reward',val:'+85'},{label:'Est. Time',val:'10 min'}].map(s=>(
              <div key={s.label} style={{textAlign:'center'}}>
                <p style={{fontSize:18,fontWeight:700,color:lesson.color}}>{s.val}</p>
                <p style={{fontSize:11,color:C.muted}}>{s.label}</p>
              </div>
            ))}
          </div>
          <Card style={{background:`${lesson.color}11`,border:`1px solid ${lesson.color}33`,marginBottom:24,textAlign:'left'}}>
            <p style={{fontSize:13,lineHeight:1.7,color:'#d1d5db'}}>
              <strong style={{color:lesson.color}}>Ryuu AI says: </strong>
              Based on your previous attempts, you're doing well with basic fractions! Today we'll practice combining fractions and converting decimals — take your time, there's no rush. 🐉
            </p>
          </Card>
        </div>
      </div>
      <button onClick={()=>setPhase('quiz')}
        style={{background:`linear-gradient(135deg,${lesson.color},${lesson.color}cc)`,border:'none',borderRadius:14,
          padding:'16px',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',width:'100%',
          boxShadow:`0 4px 20px ${lesson.color}44`,fontFamily:'DM Sans,sans-serif'}}>
        Start Lesson →
      </button>
    </div>
  );

  if(phase==='quiz')return(
    <div className="fade-in screen" style={{padding:'24px 20px',background:C.bg}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:C.muted,fontSize:18,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>✕</button>
        <div style={{display:'flex',gap:6}}>
          {questions.map((_,i)=>(
            <div key={i} style={{width:28,height:6,borderRadius:3,
              background:i<qIndex?C.green:i===qIndex?lesson.color:C.faint,transition:'background 0.3s'}}/>
          ))}
        </div>
        <span style={{color:C.gold,fontSize:13,fontWeight:600}}>Q{qIndex+1}/3</span>
      </div>

      <div style={{marginBottom:28}}>
        <p style={{color:C.muted,fontSize:12,letterSpacing:1,marginBottom:12}}>QUESTION {qIndex+1}</p>
        <h3 style={{fontFamily:"'Noto Serif JP',serif",fontSize:20,fontWeight:700,lineHeight:1.4,marginBottom:20}}>{q.q}</h3>

        {answered&&(
          <Card style={{background:C.gold+'11',border:`1px solid ${C.gold}33`,marginBottom:16,padding:'10px 14px'}}>
            <p style={{fontSize:12,color:C.goldL}}>💡 Hint: {q.hint}</p>
          </Card>
        )}

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {q.opts.map((o,i)=>{
            let bg=C.card,border=C.border,color=C.text;
            if(answered){
              if(i===q.ans){bg=C.green+'22';border=C.green+'66';color=C.greenL;}
              else if(i===selected&&i!==q.ans){bg=C.red+'22';border=C.red+'66';color=C.redL;}
            }
            return(
              <button key={i} onClick={()=>handleAnswer(i)}
                style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,padding:'14px 16px',
                  color,fontSize:14,fontWeight:500,cursor:answered?'default':'pointer',textAlign:'left',
                  transition:'all 0.2s',fontFamily:'DM Sans,sans-serif',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span><span style={{color:C.muted,marginRight:10,fontWeight:400}}>{String.fromCharCode(65+i)}.</span>{o}</span>
                {answered&&i===q.ans&&<span style={{color:C.green}}>✓</span>}
                {answered&&i===selected&&i!==q.ans&&<span style={{color:C.red}}>✗</span>}
              </button>
            );
          })}
        </div>
      </div>

      {answered&&(
        <button onClick={next}
          style={{width:'100%',background:`linear-gradient(135deg,${lesson.color},${lesson.color}bb)`,border:'none',
            borderRadius:14,padding:'15px',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',
            boxShadow:`0 4px 16px ${lesson.color}44`,fontFamily:'DM Sans,sans-serif'}}>
          {qIndex<questions.length-1?'Next Question →':'See Results →'}
        </button>
      )}
    </div>
  );

  const pct=Math.round((score/questions.length)*100);
  const grade=pct>=80
    ?{label:'Excellent!',color:C.green,emoji:'🏆',msg:"You're mastering this topic! Keep it up!"}
    :pct>=60
    ?{label:'Good Job!',color:C.gold,emoji:'⭐',msg:"Good effort! Review the questions you missed."}
    :{label:'Keep Trying',color:C.red,emoji:'💪',msg:"Don't give up! Ryuu AI has adjusted your practice."};

  return(
    <div className="fade-in screen" style={{padding:'24px 20px',background:C.bg,alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',width:'100%'}}>
        <div style={{fontSize:56,marginBottom:16}}>{grade.emoji}</div>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:26,fontWeight:700,color:grade.color,marginBottom:8}}>{grade.label}</h2>
        <p style={{color:C.muted,fontSize:14,marginBottom:28}}>{grade.msg}</p>
        <Card style={{marginBottom:16,background:`${grade.color}11`,border:`1px solid ${grade.color}33`}}>
          <div style={{display:'flex',justifyContent:'space-around',padding:'8px 0'}}>
            {[{label:'Score',val:`${score}/${questions.length}`},{label:'Accuracy',val:`${pct}%`},{label:'XP Earned',val:'+85'}].map(s=>(
              <div key={s.label} style={{textAlign:'center'}}>
                <p style={{fontSize:22,fontWeight:700,color:grade.color}}>{s.val}</p>
                <p style={{fontSize:11,color:C.muted}}>{s.label}</p>
              </div>
            ))}
          </div>
        </Card>
        <Card style={{marginBottom:24,textAlign:'left'}}>
          <p style={{fontSize:12,color:C.muted,letterSpacing:1,marginBottom:8}}>RYUU AI FEEDBACK</p>
          <p style={{fontSize:13,lineHeight:1.7,color:'#d1d5db'}}>
            {pct>=80
              ?"You showed strong understanding of fractions! Next session, we'll try mixed numbers to push your skills further."
              :"You're making progress! I've added some extra practice on the questions you found hard — we'll revisit them at a gentler pace."}
          </p>
        </Card>
        <button onClick={onBack}
          style={{width:'100%',background:`linear-gradient(135deg,${C.red},${C.redD})`,border:'none',borderRadius:14,
            padding:'15px',color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer',
            boxShadow:'0 4px 16px rgba(225,29,72,0.35)',fontFamily:'DM Sans,sans-serif'}}>
          Back to Dashboard
        </button>
      </div>
    </div>
  );
};

/* ── ROOT APP ── */
function App(){
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('dashboard');
  const [lesson,setLesson]=useState(null);

  const handleLogin=(role,name)=>{setUser({role,name});setScreen(role==='teacher'?'teacher':'dashboard');};
  const handleLogout=()=>{setUser(null);setScreen('dashboard');setLesson(null);};

  if(!user)return <div className="app-container"><LoginScreen onLogin={handleLogin}/></div>;
  if(user.role==='teacher')return <div className="app-container"><TeacherDashboard user={user} onLogout={handleLogout}/></div>;
  if(screen==='lesson'&&lesson)return <div className="app-container"><LessonScreen lesson={lesson} onBack={()=>{setLesson(null);setScreen('dashboard')}}/></div>;

  return(
    <div className="app-container">
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{flex:1,overflow:'auto'}}>
          {screen==='dashboard'&&<DashboardScreen user={user} setScreen={setScreen} setLesson={setLesson}/>}
          {screen==='path'&&<PathScreen setScreen={setScreen} setLesson={setLesson}/>}
          {screen==='progress'&&<ProgressScreen/>}
          {screen==='achievements'&&<AchievementsScreen/>}
        </div>
        <BottomNav screen={screen} setScreen={setScreen}/>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
